function AFraud(){
  var sf=useState(FRAUD_FLAGS.map(function(f){return Object.assign({},f);})); var flags=sf[0]; var setFlags=sf[1];
  var sfil=useState('all'); var filter=sfil[0]; var setFilter=sfil[1];
  var pending=flags.filter(function(f){return f.status==='pending';});
  var fraudColor={'GPS Spoofing':'#EF4444','Platform Mismatch':'#D97706','New Account Spike':'#8B5CF6','Duplicate':'#F97316'};
  var filtered=filter==='all'?flags:filter==='pending'?pending:flags.filter(function(f){return f.status!=='pending';});
  function handle(id,action){setFlags(flags.map(function(f){return f.id===id?Object.assign({},f,{status:action}):f;}));}
  return h('div',null,
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:20}},
      [{l:'Pending',v:pending.length,c:'#D97706'},{l:'Blocked Today',v:5,c:'#EF4444'},{l:'Amount Saved',v:'Rs.12,400',c:'#16A34A'},{l:'Accuracy',v:'94%',c:'#2563EB'}].map(function(r){return h('div',{key:r.l,style:{background:'white',borderRadius:14,padding:18,border:'1px solid #E2E8F0',textAlign:'center'}},h('div',{style:{fontSize:26,fontWeight:800,color:r.c}},r.v),h('div',{style:{fontSize:12,color:'#94A3B8',marginTop:4}},r.l));})
    ),
    h('div',{style:{display:'flex',gap:8,marginBottom:20}},
      [['all','All'],['pending','Pending'],['resolved','Resolved']].map(function(r){return h('button',{key:r[0],onClick:function(){setFilter(r[0]);},style:{background:filter===r[0]?'#2563EB':'white',color:filter===r[0]?'white':'#64748B',border:filter===r[0]?'none':'1px solid #E2E8F0',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}},r[1]);})
    ),
    filtered.map(function(f){return h('div',{key:f.id,style:{background:'white',borderRadius:16,border:'1px solid '+(f.status==='pending'?'#FED7AA':'#E2E8F0'),padding:20,marginBottom:16,opacity:f.status!=='pending'?0.7:1}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}},
        h('div',null,h('div',{style:{fontSize:16,fontWeight:700,color:'#1E293B'}},f.name),h('div',{style:{fontSize:13,color:'#94A3B8'}},f.platform+' · '+f.zone+' · '+f.date)),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:22,fontWeight:800,color:'#DC2626'}},'Rs.'+f.amt),
          h('span',{style:{background:(fraudColor[f.fraud]||'#64748B')+'22',color:fraudColor[f.fraud]||'#64748B',padding:'3px 10px',borderRadius:20,fontSize:12,fontWeight:700}},f.fraud)
        )
      ),
      h('div',{style:{background:'#FFF7ED',borderRadius:12,padding:14,marginBottom:14}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'#92400E',marginBottom:8}},'WHY FLAGGED'),
        [
          f.fraud==='GPS Spoofing'?('GPS: Claimed '+f.claimedZone+', actual '+f.actualZone+' ('+f.dist+'km gap)'):null,
          'Platform: '+f.orders+' orders completed during event',
          f.age<30?('Account age: '+f.age+' days (new account)'):null,
          f.fraud==='Platform Mismatch'?'Platform logs contradict claim timing':null,
        ].filter(function(x){return x!=null;}).map(function(item,i){return h('div',{key:i,style:{fontSize:13,color:'#78350F',marginBottom:4}},'· '+item);})
      ),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('span',null,h('span',{style:{fontSize:13,color:'#64748B'}},'GTS Score: '),h('span',{style:{fontWeight:700,color:'#EF4444'}},f.gts.toFixed(2))),
        h('div',{style:{background:'#EFF6FF',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,color:'#2563EB'}},'Confidence: '+Math.round(f.conf*100)+'%')
      ),
      h('div',{style:{fontFamily:'monospace',fontSize:11,background:'#F8FAFC',borderRadius:8,padding:12,marginBottom:14,color:'#64748B',whiteSpace:'pre-wrap'}},
        'CLAIMED: '+f.claimedZone+' | ACTUAL: '+f.actualZone+'\nDIST: '+f.dist+'km | ORDERS: '+f.orders+'\nACC_AGE: '+f.age+'d | GTS: '+f.gts
      ),
      f.status==='pending'?h('div',{style:{display:'flex',gap:10}},
        h('button',{onClick:function(){handle(f.id,'blacklisted');},style:{flex:1,background:'#7F1D1D',color:'white',border:'none',borderRadius:10,padding:11,fontWeight:700,fontSize:13,cursor:'pointer'}},'Reject & Blacklist'),
        h('button',{onClick:function(){handle(f.id,'rejected');},style:{flex:1,background:'#FEE2E2',color:'#DC2626',border:'none',borderRadius:10,padding:11,fontWeight:700,fontSize:13,cursor:'pointer'}},'Reject'),
        h('button',{onClick:function(){handle(f.id,'approved');},style:{flex:1,background:'#DCFCE7',color:'#16A34A',border:'none',borderRadius:10,padding:11,fontWeight:700,fontSize:13,cursor:'pointer'}},'Approve')
      ):h(Badge,{label:f.status.charAt(0).toUpperCase()+f.status.slice(1),color:f.status==='approved'?'#16A34A':'#EF4444',bg:f.status==='approved'?'#DCFCE7':'#FEE2E2',size:13})
    );}),
    h('div',{style:{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:14,padding:20,marginTop:8}},
      h('div',{style:{fontWeight:700,color:'#92400E',marginBottom:8}},'Fraud Pattern Insights'),
      h('div',{style:{fontSize:14,color:'#78350F',lineHeight:1.6}},'Top fraud pattern this week: GPS spoofing in Dharavi zone (4 attempts). New account spike observed — 3 accounts under 15 days filed claims in AQI events.')
    )
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function Root(){
  var sg=useState(function(){try{var s=localStorage.getItem('gs2');return s?JSON.parse(s):{route:'/',workerLoggedIn:true,adminLoggedIn:false,covered:false,lang:'en',confetti:false};}catch(e){return {route:'/',workerLoggedIn:true,adminLoggedIn:false,covered:false,lang:'en',confetti:false};}});
  var gs=sg[0]; var setGsRaw=sg[1];
  function setGs(s){try{localStorage.setItem('gs2',JSON.stringify(s));}catch(e){} setGsRaw(s);}
  var sr=useState(gs.route||'/'); var route=sr[0]; var setRoute=sr[1];
  function navigate(r){setRoute(r); setGs(Object.assign({},gs,{route:r}));}
  var page;
  if(route==='/') page=h(DeliveryApp,{navigate:navigate});
  else if(route==='/gigshield') page=h(Entry,{navigate:navigate,gs:gs,setGs:setGs});
  else if(route==='/worker') page=h(WorkerApp,{navigate:navigate,gs:gs,setGs:setGs});
  else if(route==='/admin') page=h(AdminApp,{navigate:navigate,gs:gs,setGs:setGs});
  else page=h(DeliveryApp,{navigate:navigate});
  return h(Fragment,null, gs.confetti&&h(Confetti), page);
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Root));
</script>
