<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>GigShield — Income Protection for Gig Workers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amazon+Ember:wght@300;400;700&family=Noto+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.16/umd/Recharts.js"></script>
    <style>
        /* ── AMAZON DESIGN SYSTEM ── */
        :root {
            --amz-navy: #232F3E;
            --amz-navy2: #131921;
            --amz-nav-top: #232F3E;
            --amz-orange: #FF9900;
            --amz-orange2: #FA8900;
            --amz-orange-l: #FEBD69;
            --amz-yellow: #F0C14B;
            --amz-link: #007185;
            --amz-link2: #C7511F;
            --amz-green: #067D62;
            --amz-green2: #e7f5f0;
            --amz-red: #B12704;
            --amz-red-l: #fff0f0;
            --amz-grey: #565959;
            --amz-grey2: #888C8C;
            --amz-line: #D5D9D9;
            --amz-bg: #EAEDED;
            --amz-white: #FFFFFF;
            --amz-card: #FFFFFF;
            --amz-text: #0F1111;
            --amz-text2: #565959;
            --amz-shadow: 0 2px 5px rgba(213, 217, 217, .5);
            --amz-shadow2: 0 1px 3px rgba(0, 0, 0, .08), 0 4px 16px rgba(0, 0, 0, .06);
            --rad: 8px;
            --rad-sm: 4px;
        }
        /* ── DARK MODE ── */
        body.dark {
            --amz-navy: #1a2332;
            --amz-navy2: #0d1117;
            --amz-bg: #0d1117;
            --amz-white: #161b22;
            --amz-card: #161b22;
            --amz-text: #e6edf3;
            --amz-text2: #8b949e;
            --amz-line: #30363d;
            --amz-grey: #8b949e;
            --amz-grey2: #6e7681;
            --amz-shadow: 0 2px 8px rgba(0,0,0,.4);
            --amz-shadow2: 0 4px 16px rgba(0,0,0,.3);
        }
        body.dark .amz-input, body.dark .amz-select { background: #0d1117; color: #e6edf3; border-color: #30363d; }
        body.dark .amz-input:focus, body.dark .amz-select:focus { border-color: #FF9900; }
        body.dark .btn-secondary { background: #21262d; border-color: #30363d; color: #e6edf3; }
        body.dark .sim-log { background: #0d1117; }
        body.dark table thead tr { background: #161b22 !important; }
        body.dark .amz-card { background: var(--amz-card); border-color: var(--amz-line); }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Noto Sans', Arial, sans-serif;
            background: var(--amz-bg);
            color: var(--amz-text);
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        button,
        input,
        select,
        textarea {
            font-family: 'Noto Sans', Arial, sans-serif
        }

        button {
            cursor: pointer
        }

        /* ── LAYOUT ── */
        .mob {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--amz-bg)
        }

        .adm {
            display: flex;
            min-height: 100vh;
            width: 100%;
            background: var(--amz-bg)
        }

        .ns::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        .ns::-webkit-scrollbar-track {
            background: transparent
        }

        .ns::-webkit-scrollbar-thumb {
            background: var(--amz-line);
            border-radius: 4px
        }

        /* ── AMAZON BUTTON STYLES ── */
        .btn-primary {
            background: linear-gradient(to bottom, #f0c14b, #dba63a);
            border: 1px solid #a88734;
            border-radius: var(--rad-sm);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--amz-text);
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .4) inset;
            transition: filter .1s;
        }

        .btn-primary:hover {
            filter: brightness(.97)
        }

        .btn-primary:active {
            background: linear-gradient(to bottom, #dba63a, #f0c14b)
        }

        .btn-orange {
            background: linear-gradient(to bottom, #ff9900, #e88b00);
            border: 1px solid #c45500;
            border-radius: var(--rad-sm);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--amz-text);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .4) inset;
            transition: filter .1s;
        }

        .btn-orange:hover {
            filter: brightness(.97)
        }

        .btn-secondary {
            background: linear-gradient(to bottom, #f7f8f8, #e7e9ea);
            border: 1px solid #adb1b8;
            border-radius: var(--rad-sm);
            padding: 9px 16px;
            font-size: 13px;
            color: var(--amz-text);
            cursor: pointer;
            width: 100%;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .6) inset;
        }

        /* ── AMAZON INPUT STYLES ── */
        .amz-input {
            width: 100%;
            border: 1px solid var(--amz-line);
            border-radius: var(--rad-sm);
            padding: 8px 10px;
            font-size: 13px;
            color: var(--amz-text);
            outline: none;
            background: white;
            transition: border-color .15s, box-shadow .15s;
        }

        .amz-input:focus {
            border-color: #e77600;
            box-shadow: 0 0 0 3px rgba(228, 121, 17, .25);
        }

        .amz-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--amz-text);
            display: block;
            margin-bottom: 5px;
        }

        .amz-select {
            width: 100%;
            border: 1px solid var(--amz-line);
            border-radius: var(--rad-sm);
            padding: 8px 10px;
            font-size: 13px;
            color: var(--amz-text);
            background: white;
            outline: none;
            cursor: pointer;
        }

        .amz-select:focus {
            border-color: #e77600;
            box-shadow: 0 0 0 3px rgba(228, 121, 17, .25)
        }

        /* ── AMAZON CARD ── */
        .amz-card {
            background: var(--amz-white);
            border: 1px solid var(--amz-line);
            border-radius: var(--rad);
            box-shadow: var(--amz-shadow);
        }

        .amz-card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--amz-line);
            font-size: 17px;
            font-weight: 700;
            color: var(--amz-text);
        }

        /* ── AMAZON ORANGE BADGE / PILL ── */
        .amz-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: var(--rad-sm);
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .amz-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* ── TOP NAV (exact Amazon) ── */
        .amz-topnav {
            background: var(--amz-navy);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .amz-topnav-inner {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
        }

        .amz-logo {
            display: flex;
            align-items: center;
            gap: 2px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -.5px;
            flex-shrink: 0;
        }

        .amz-logo .logo-shield {
            width: 32px;
            height: 32px;
            background: var(--amz-orange);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 4px;
        }

        .amz-search-wrap {
            flex: 1;
            display: flex;
            border-radius: var(--rad-sm);
            overflow: hidden;
        }

        .amz-search-input {
            flex: 1;
            border: none;
            padding: 8px 10px;
            font-size: 13px;
            outline: none;
        }

        .amz-search-btn {
            background: var(--amz-orange);
            border: none;
            padding: 0 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* ── AMAZON SUBNAV ── */
        .amz-subnav {
            background: var(--amz-navy2);
            padding: 6px 12px;
            display: flex;
            gap: 2px;
            overflow-x: auto;
        }

        .amz-subnav::-webkit-scrollbar {
            display: none
        }

        .amz-subnav-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--rad-sm);
            padding: 5px 10px;
            color: white;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }

        .amz-subnav-btn.active,
        .amz-subnav-btn:hover {
            border-color: white;
        }

        /* ── BOTTOM NAV (mobile) ── */
        .amz-botnav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: var(--amz-white);
            border-top: 1px solid var(--amz-line);
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .amz-botnav-btn {
            flex: 1;
            padding: 10px 4px 8px;
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: var(--amz-grey2);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }

        .amz-botnav-btn.active {
            color: var(--amz-orange)
        }

        .amz-botnav-btn.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 25%;
            width: 50%;
            height: 2.5px;
            background: var(--amz-orange);
            border-radius: 0 0 3px 3px;
        }

        /* ── ADMIN SIDEBAR ── */
        .adm-sidebar {
            width: 220px;
            background: var(--amz-navy);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            flex-shrink: 0;
        }

        .adm-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 18px;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .15s;
            background: transparent;
            border-top: none;
            border-right: none;
            border-bottom: none;
            text-align: left;
            width: 100%;
        }

        .adm-nav-item:hover {
            background: rgba(255, 255, 255, .08);
            color: white
        }

        .adm-nav-item.active {
            background: rgba(255, 153, 0, .15);
            border-left-color: var(--amz-orange);
            color: var(--amz-orange);
        }

        /* ── AMAZON LINK STYLE ── */
        .amz-link {
            color: var(--amz-link);
            cursor: pointer;
            font-size: 13px
        }

        .amz-link:hover {
            color: var(--amz-link2);
            text-decoration: underline
        }

        /* ── PROGRESS BAR ── */
        .prog {
            height: 6px;
            background: var(--amz-line);
            border-radius: 4px;
            overflow: hidden
        }

        .prog-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .5s ease
        }

        /* ── TOGGLE ── */
        .toggle {
            width: 40px;
            height: 22px;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background .2s;
            flex-shrink: 0
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: left .2s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .3)
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes scrollUp {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-50%)
            }
        }

        @keyframes confettiDrop {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1 }
            80% { opacity: 1 }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0 }
        }
        @keyframes wriStroke {
            from { stroke-dashoffset: 276.46; }
        }
        @keyframes ticker {
            0% { transform: translateX(0) }
            100% { transform: translateX(-50%) }
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0 }
            to { transform: translateX(0); opacity: 1 }
        }
        @keyframes heroGrad {
            0%,100% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
        }
        @keyframes logEntry {
            from { opacity: 0; transform: translateX(-8px) }
            to { opacity: 1; transform: translateX(0) }
        }
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: .8 }
            100% { transform: scale(2.2); opacity: 0 }
        }
        @keyframes barGrow {
            from { transform: scaleY(0); transform-origin: bottom }
            to { transform: scaleY(1); transform-origin: bottom }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0 }
            100% { background-position: 200% 0 }
        }

        @keyframes payoutSlide {
            from {
                transform: translateY(-80px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .au {
            animation: fadeUp .35s ease-out both
        }

        .ai {
            animation: fadeIn .25s ease-out both
        }

        .spin {
            animation: spin .8s linear infinite
        }

        .blink {
            animation: pulse 1.4s ease infinite
        }

        .scrollup {
            animation: scrollUp 22s linear infinite
        }

        .cfetti {
            position: fixed;
            top: -20px;
            border-radius: 2px;
            animation: confettiDrop 3.5s ease-in forwards;
            z-index: 9999;
            pointer-events: none
        }

        /* ── SKELETON LOADER ── */
        .skeleton {
            background: linear-gradient(90deg, var(--amz-line) 25%, #f0f0f0 50%, var(--amz-line) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 4px;
        }
        body.dark .skeleton {
            background: linear-gradient(90deg, #21262d 25%, #30363d 50%, #21262d 75%);
            background-size: 200% 100%;
        }

        /* ── CARD HOVER ── */
        .amz-card { transition: box-shadow .2s, transform .2s; }
        .amz-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.12); }
        .card-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.13); }

        /* ── TICKER ── */
        .ticker-wrap { overflow: hidden; background: var(--amz-navy2); padding: 6px 0; }
        .ticker-inner { display: flex; white-space: nowrap; animation: ticker 28s linear infinite; }
        .ticker-item { padding: 0 28px; font-size: 11px; color: #ccc; display: flex; align-items: center; gap: 6px; }

        /* ── PULSE ZONE ── */
        .pulse-zone { position: relative; display: inline-block; }
        .pulse-zone::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: pulseRing 1.6s ease-out infinite;
        }

        /* ── HERO ── */
        .hero-grad {
            background: linear-gradient(135deg, #232F3E 0%, #1a3a4a 40%, #0d2233 100%);
            background-size: 200% 200%;
            animation: heroGrad 8s ease infinite;
        }

        /* ── LOG ENTRY ── */
        .log-entry { animation: logEntry .3s ease-out both; }

        /* ── DARK TOGGLE BTN ── */
        .dark-toggle {
            background: none; border: 1px solid rgba(255,255,255,.2);
            border-radius: 20px; padding: 4px 10px; color: white;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: background .2s;
        }
        .dark-toggle:hover { background: rgba(255,255,255,.1); }

        /* ── FOOTER ── */
        .gs-footer {
            background: var(--amz-navy2);
            color: #888C8C;
            padding: 20px 24px;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,.06);
        }

        /* ── EXPORT BTN ── */
        .export-btn {
            background: white; border: 1px solid var(--amz-line);
            border-radius: var(--rad-sm); padding: 7px 14px;
            font-size: 12px; font-weight: 600; color: var(--amz-link);
            cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: background .15s;
        }
        .export-btn:hover { background: #f0f7ff; }

        /* ── CHART FILTER TABS ── */
        .chart-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .chart-tab {
            background: var(--amz-bg); border: 1px solid var(--amz-line);
            border-radius: 3px; padding: 4px 10px; font-size: 11px;
            font-weight: 600; color: var(--amz-grey); cursor: pointer;
            transition: all .15s;
        }
        .chart-tab.active { background: var(--amz-navy); color: white; border-color: var(--amz-navy); }

        /* ── FRAUD CARDS ── */
        .fraud-metric-card {
            background: var(--amz-card); border: 1px solid var(--amz-line);
            border-radius: var(--rad); padding: 16px; text-align: center;
            transition: transform .2s, box-shadow .2s;
        }
        .fraud-metric-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }

        /* ── HOW IT WORKS ── */
        .how-step {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 16px 8px; flex: 1;
        }
        .how-step-icon {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 10px;
            background: rgba(255,153,0,.15); border: 2px solid rgba(255,153,0,.3);
        }
        .how-connector {
            width: 2px; height: 32px; background: linear-gradient(to bottom, #FF9900, transparent);
            margin: 0 auto;
        }

        /* ── AMAZON SPECIFIC DETAIL STYLES ── */
        .price-large {
            font-size: 22px;
            font-weight: 700;
            color: var(--amz-red)
        }

        .star-rating {
            color: var(--amz-orange);
            font-size: 13px
        }

        .prime-badge {
            color: #00A8E1;
            font-size: 11px;
            font-weight: 700
        }

        .amz-divider {
            height: 1px;
            background: var(--amz-line);
            margin: 12px 0
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--amz-text);
            margin-bottom: 12px;
            border-left: 3px solid var(--amz-orange);
            padding-left: 8px
        }

        /* ── STATUS COLORS ── */
        .status-paid {
            background: #e7f5f0;
            color: #067D62;
            border: 1px solid #b2dfdb
        }

        .status-review {
            background: #fff8e7;
            color: #8a6116;
            border: 1px solid #f5d78e
        }

        .status-rejected {
            background: #fff0f0;
            color: #B12704;
            border: 1px solid #f5b7b1
        }

        .risk-low {
            background: #e7f5f0;
            color: #067D62
        }

        .risk-medium {
            background: #fff8e7;
            color: #8a6116
        }

        .risk-high {
            background: #fff3e0;
            color: #c45500
        }

        .risk-critical {
            background: #fff0f0;
            color: #B12704
        }

        /* ── TOAST ── */
        .amz-toast {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: var(--amz-navy);
            color: white;
            border-bottom: 3px solid var(--amz-orange);
            padding: 14px 20px;
            z-index: 9998;
            width: 100%;
            max-width: 430px;
            animation: payoutSlide .4s ease-out;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
        }

        /* ── SIMULATION LOG ── */
        .sim-log {
            background: #0d1117;
            border-radius: var(--rad-sm);
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .sim-log::-webkit-scrollbar {
            width: 3px
        }

        .sim-log::-webkit-scrollbar-thumb {
            background: #333
        }

        .log-ok {
            color: #4ADE80
        }

        .log-warn {
            color: #FBBF24
        }

        .log-info {
            color: #60A5FA
        }

        .log-dim {
            color: #666
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script>

            var [route, setRoute] = useState(gs.route || '/gigshield');
            useEffect(() => { document.body.classList.toggle('dark', !!gs.dark); }, [gs.dark]);
            function navigate(r) { setRoute(r); setGs(Object.assign({}, gs, { route: r })); }
            var page;
            if (route === '/gigshield') page = h(Entry, { navigate, gs, setGs });
            else if (route === '/register') page = h(Registration, { navigate, gs, setGs });
            else if (route === '/worker') page = h(WorkerApp, { navigate, gs, setGs });
            else if (route === '/admin') page = h(AdminApp, { navigate, gs, setGs });
            else page = h(Entry, { navigate, gs, setGs });
            return h(Fragment, null, gs.confetti && h(Confetti), page);
        }

        function initApp() {
            const rootEl = document.getElementById('root');
            if (!rootEl) return;
            try {
                ReactDOM.createRoot(rootEl).render(h(Root));
            } catch (e) {
                console.error("Render failed", e);
                window.onerror(e.message, "index.html", "Init");
            }
        }

        if (document.readyState === 'complete') {
            initApp();
        } else {
            window.addEventListener('load', initApp);
        }
    </script>
</body>

</html>
